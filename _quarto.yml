project:
  type: book
  output-dir: docs
  # execute:
  #   cache: true
  #   freeze: auto
  
book:
  title: "Longitudinal Data Analysis with R"
  subtitle: "A Practical Introduction from Theory to Code"
  author: "Dr Clemens Jarnach"
  date: "04/16/2026"
  repo-url: https://github.com/clemensjarnach/longitudinal_data_analysis_workshop
  chapters:
    - index.qmd
    - 01_exercise_farm_panel_fe.qmd
    - 02_panel_data_and_fixed_effects.qmd
    - 03_r_fundamentals.qmd
    - 04_panel_data_in_r.qmd
    - 05_exercise_farm_panel_re.qmd
    - 06_summary.qmd
    - feedback.qmd
    - how_to_cite.qmd
    - references.qmd
    - appendix.qmd

bibliography: references.bib

format:
  html:
    split-by: chapter  
    number-depth: 1
    theme: cosmo
    highlight-style: atom-one
    code-block-bg: "#f0f0f0"
    code-block-border-left: "#045a8d"
    code-fold: false
    code-summary: "Code"
    code-tools: true
    code-link: true
    code-copy: true
    knitr:
      opts_chunk:
        out.width: 100%
        R.options:
          width: 68
  # pdf:
  #   documentclass: scrbook
  #   always_allow_html: true
  #   include-in-header:
  #     - text: |
  #         \usepackage{dcolumn}
    
pdf-engine: lualatex
